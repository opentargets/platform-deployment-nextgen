      cpu: 500m
  api:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 4Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  aiapi:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 72Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
  clickhouse:
    replicas: 2
    storageSize: 125Gi
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 10Gi
      cpu: 2000m
  opensearch:
    replicas: 2
    storageSize: 50Gi
