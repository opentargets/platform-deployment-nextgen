gcpProject: open-targets-prod
prefix: production
product: ppp
domain: opentargets.org
dnsZone: opentargets-org

production: blue
staging: enabled

googleTagManagerId: GTM-5BSVCXB

blue:
  release: '26.03'
  webapp:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.15.10
  api:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:26.03.2-rc.1
  aiapi:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
    secrets:
      openai: openai-token
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.18.1
    snapshot: projects/open-targets-eu-dev/global/snapshots/ppp-2603-ch-rc2
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    snapshot: projects/open-targets-eu-dev/global/snapshots/ppp-2603-os-rc1

green:
  release: '25.12'
  webapp:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.14.9
  api:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:25.5.0-rc.2
  aiapi:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
    secrets:
      openai: openai-token
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.18.1
    snapshot: projects/open-targets-eu-dev/global/snapshots/ppp-2603-ch-rc2
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    snapshot: projects/open-targets-eu-dev/global/snapshots/ppp-2603-os-rc1

resources:
  webapp:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
  api:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  aiapi:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 72Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
  clickhouse:
    replicas: 2
    storageSize: 400Gi
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 10Gi
      cpu: 2000m
  opensearch:
    replicas: 2
    storageSize: 400Gi
    heapSize: 2g
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 4000m

security:
  rateLimiterWhitelist: []
  blacklist: []
