gcpProject: ""
prefix: local
product: platform
domain: "127.0.0.1.nip.io"
dnsZone: ""

googleTagManagerId: GTM-XXXXXXX

gcp:
  enabled: false

release: '26.03'
webapp:
  image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.15.7
api:
  image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:26.03.0
aiapi:
  enabled: false
  image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
  secrets:
    openai: ""
clickhouse:
  image: clickhouse/clickhouse-server:25.8.18.1
  snapshot: ""  # no snapshot init locally; starts with an empty volume
opensearch:
  image: opensearchproject/opensearch:3.5.0
  snapshot: ""  # no snapshot init locally; starts with an empty volume

resources:
  webapp:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
  api:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m
  aiapi:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 72Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
  clickhouse:
    replicas: 1
    storageSize: 10Gi
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 2Gi
      cpu: 500m
  opensearch:
    replicas: 1
    storageSize: 10Gi
    heapSize: 512m
    requests:
      memory: 768Mi
      cpu: 100m
    limits:
      memory: 2Gi
      cpu: 500m

security:
  rateLimiterWhitelist: []
  blacklist: []

imagePullSecrets:
  - name: gcr-pull-secret
