gcpProject: open-targets-eu-dev
prefix: devcluster
product: ppp
domain: opentargets.xyz
dnsZone: opentargets-xyz

production: blue
staging: disabled

googleTagManagerId: GTM-XXXXXXX

blue:
  release: '26.03'
  webapp:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.15.4
  api:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:26.0.0-4247.18
  aiapi:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
    secrets:
      openai: openai-token

green:
  release: '25.12'
  webapp:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.14.9
  api:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:25.5.0-rc.2
  aiapi:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
    secrets:
      openai: openai-token

resources:
  webapp:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 64Mi
      cpu: 200m
  api:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 4Gi
      cpu: 1000m
    limits:
      memory: 6Gi
      cpu: 1875m
  aiapi:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m
