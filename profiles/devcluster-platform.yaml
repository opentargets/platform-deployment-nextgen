gcpProject: open-targets-eu-dev
prefix: devcluster
product: platform
domain: opentargets.xyz
dnsZone: opentargets-xyz

production: blue
staging: disabled

googleTagManagerId: GTM-XXXXXXX

blue:
  release: '26.03'
  webapp:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.15.7
  api:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:26.03.0
  aiapi:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
    secrets:
      openai: openai-token
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.18.1
    snapshot: projects/open-targets-eu-dev/global/snapshots/platform-2603-ch-rc5
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    snapshot: projects/open-targets-eu-dev/global/snapshots/platform-2603-os-rc5

green:
  release: '26.03'
  webapp:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.15.7
  api:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:26.03.0
  aiapi:
    image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
    secrets:
      openai: openai-token
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.18.1
    snapshot: platform-2603-ch-rc5
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    snapshot: platform-2603-os-rc5

resources:
  disk:
    iops: '3000'
    throughput: 140Mi
  webapp:
    minReplicas: 1
    maxReplicas: 5
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 64Mi
      cpu: 200m
  api:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 4Gi
      cpu: 1000m
    limits:
      memory: 6Gi
      cpu: 1875m
  aiapi:
    minReplicas: 1
    maxReplicas: 5
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m
  clickhouse:
    replicas: 1
    storageSize: 400Gi
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 10Gi
      cpu: 10000m
  opensearch:
    replicas: 1
    storageSize: 400Gi
    heapSize: 15g
    requests:
      memory: 20Gi
      cpu: 1000m
    limits:
      memory: 28Gi
      cpu: 10000m
