gcpProject: ""
prefix: local-blue
product: platform
domain: blue.localhost
dnsZone: ""

googleTagManagerId: GTM-XXXXXXX

gcp:
  enabled: false
  ingress: false

release: "26.03"
webapp:
  image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps:0.16.7
api:
  image: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api:26.03.0
aiapi:
  image: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api:0.0.13
  secrets:
    openai: "dummy"
clickhouse:
  image: clickhouse/clickhouse-server:25.8.18.1
  snapshot: "" # no snapshot init locally; starts with an empty volume
opensearch:
  image: opensearchproject/opensearch:3.5.0
  snapshot: "" # no snapshot init locally; starts with an empty volume

resources:
  webapp:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
  api:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 1000m
  aiapi:
    minReplicas: 1
    maxReplicas: 1
    requests:
      memory: 72Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  clickhouse:
    replicas: 1
    storageSize: 1Gi
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m
  opensearch:
    replicas: 1
    storageSize: 1Gi
    heapSize: 256m
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

security:
  rateLimiterWhitelist: []
  blacklist: []

imagePullSecrets:
  - name: gcr-pull-secret
