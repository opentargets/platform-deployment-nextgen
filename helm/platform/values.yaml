gcpProject: open-targets-eu-dev
prefix: devcluster
product: platform
domain: opentargets.xyz
dnsZone: opentargets-xyz

production: blue
staging: disabled

googleTagManagerId: GTM-XXXXXXX

blue:
  release: '25.06'
  webapp:
    image:
      name: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps
      tag: '0.12.8'

  api:
    image:
      name: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api
      tag: '25.0.2'
  aiapi:
    image:
      name: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api
      tag: '0.0.13'
    secrets:
      openai: openai-token

green:
  release: '25.09'
  webapp:
    image:
      name: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ui-apps/ot-ui-apps
      tag: '0.13.2'
  api:
    image:
      name: europe-west1-docker.pkg.dev/open-targets-eu-dev/platform-api/platform-api
      tag: '25.2.1'
  aiapi:
    image:
      name: europe-west1-docker.pkg.dev/open-targets-eu-dev/ot-ai-api/ot-ai-api
      tag: '0.0.13'
    secrets:
      openai: openai-token

resources:
  webapp:
    minReplicas: 1
    maxReplicas: 5
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 64Mi
      cpu: 200m
  api:
    minReplicas: 2
    maxReplicas: 5
    requests:
      memory: 16Gi
      cpu: 4000m
    limits:
      memory: 24Gi
      cpu: 7500m
  aiapi:
    minReplicas: 1
    maxReplicas: 5
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m
