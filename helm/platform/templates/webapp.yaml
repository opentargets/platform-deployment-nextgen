{{- define "deployment.webapp" }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
{{- $subdomain := include "subdomain" . }}
{{- $resources := .Values.resources.webapp }}
---
# ServiceAccount for {{ $namespace }} WebApp.
# Kubernetes API access is disabled; the WebApp does not need it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $namespace }}-webapp
  namespace: {{ $namespace }}
  labels:
    app: webapp
    {{- $labels | nindent 4 }}
automountServiceAccountToken: false


---
# NetworkPolicy for {{ $namespace }} WebApp.
# Allows ingress from all sources to the HTTP port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-webapp-ingress
  namespace: {{ $namespace }}
  labels:
    app: webapp
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: webapp
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: {{ include "ports.http" . }}


---
# HorizontalPodAutoscaler for {{ $namespace }} WebApp.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $namespace }}-webapp-hpa
  namespace: {{ $namespace }}
  labels:
    app: webapp
    {{- $labels | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $namespace }}-webapp
  minReplicas: {{ $resources.minReplicas }}
  maxReplicas: {{ $resources.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60


---
# PodDisruptionBudget for {{ $namespace }} WebApp.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $namespace }}-webapp-pdb
  namespace: {{ $namespace }}
  labels:
    app: webapp
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webapp


---
# WebApp Deployment for {{ $namespace }}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $namespace }}-webapp
  namespace: {{ $namespace }}
  labels:
    app: webapp
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
        {{- $labels | nindent 8 }}
    spec:
      serviceAccountName: {{ $namespace }}-webapp
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.gcp.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - production
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  product: {{ .Values.product }}
                  app: webapp
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: webapp
          image: {{ .Values.webapp.image }}
          ports:
            - containerPort: {{ include "ports.http" . }}
              name: http
          env:
            - name: WEBAPP_API_URL
              value: https://api.{{ $subdomain }}/api/v4/graphql
            - name: WEBAPP_OPENAI_URL
              value: https://ai.{{ $subdomain }}
            {{- if eq .Values.prefix "production" }}
            - name: WEBAPP_GOOGLE_TAG_MANAGER_ID
              value: {{ .Values.googleTagManagerId }}
            {{- end }}
            - name: WEBAPP_FLAVOR
              value: {{ .Values.product }}
          resources:
            requests:
              memory: {{ $resources.requests.memory }}
              cpu: {{ $resources.requests.cpu }}
            limits:
              memory: {{ $resources.limits.memory }}
              cpu: {{ $resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: {{ include "paths.health.webapp" . }}
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: {{ include "paths.health.webapp" . }}
              port: http
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
{{- end }}
