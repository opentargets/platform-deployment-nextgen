{{ define "service.clickhouse" }}
{{- $root := .root }}
{{- $env := .env | default "prod" }}
{{- $namespace := include "prefix-product" .root }}
{{- $labels := include "labels" .root }}
{{- $deploymentColor := include "deploymentColor" (dict "root" .root "env" .env) -}}
---
# Service for {{ $namespace }}-{{ $env }} ClickHouse.
apiVersion: v1
kind: Service
metadata:
  name: {{ $namespace }}-{{ $env }}-clickhouse
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    environment: {{ $env }}
    {{- $labels | nindent 4 }}
  annotations:
    prometheus.io/scrape: {{ if and (eq $env "prod") (eq .root.Values.product "platform") }}"true"{{ else }}"false"{{ end }}
spec:
  type: ClusterIP
  selector:
    app: clickhouse
    color: {{ $deploymentColor }}
  ports:
    - port: {{ include "ports.clickhouse" $root }}
      targetPort: {{ include "ports.clickhouse" $root }}
      name: http
    - port: {{ include "ports.clickhouse.native" $root }}
      targetPort: {{ include "ports.clickhouse.native" $root }}
      name: native
    - port: {{ include "ports.clickhouse.metrics" $root }}
      targetPort: {{ include "ports.clickhouse.metrics" $root }}
      name: metrics
{{- end }}


