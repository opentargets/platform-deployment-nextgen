{{ define "service.clickhouse" }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
---
# Service for {{ $namespace }} ClickHouse.
apiVersion: v1
kind: Service
metadata:
  name: {{ $namespace }}-clickhouse
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    {{- $labels | nindent 4 }}
  annotations:
    prometheus.io/scrape: {{ if eq .Values.product "platform" }}"true"{{ else }}"false"{{ end }}
spec:
  type: ClusterIP
  selector:
    app: clickhouse
  ports:
    - port: {{ include "ports.clickhouse" . }}
      targetPort: {{ include "ports.clickhouse" . }}
      name: http
    - port: {{ include "ports.clickhouse.native" . }}
      targetPort: {{ include "ports.clickhouse.native" . }}
      name: native
    - port: {{ include "ports.clickhouse.metrics" . }}
      targetPort: {{ include "ports.clickhouse.metrics" . }}
      name: metrics
{{- end }}


{{ define "service.opensearch" }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
