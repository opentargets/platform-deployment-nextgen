{{ define "service.webapp" }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
---
# Service for {{ $namespace }} WebApp.
apiVersion: v1
kind: Service
metadata:
  name: {{ $namespace }}-webapp
  namespace: {{ $namespace }}
  labels:
    app: webapp
    {{- $labels | nindent 4 }}
  {{- if .Values.gcp.enabled }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "{{ $namespace }}-backendconfig-cdn"}'
  {{- end }}
spec:
  selector:
    app: webapp
  ports:
    - port: {{ include "ports.http" . }}
      targetPort: {{ include "ports.http" . }}
      protocol: TCP
      name: http
  type: NodePort
{{- end }}


{{ define "service.api" }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
---
# Service for {{ $namespace }} API.
apiVersion: v1
kind: Service
metadata:
  name: {{ $namespace }}-api
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
  annotations:
    {{- if .Values.gcp.enabled }}
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "{{ $namespace }}-backendconfig-no-cdn"}'
    {{- end }}
    prometheus.io/scrape: {{ if eq .Values.product "platform" }}"true"{{ else }}"false"{{ end }}
spec:
  selector:
    app: api
  ports:
    - port: {{ include "ports.http" . }}
      targetPort: {{ include "ports.http" . }}
      protocol: TCP
      name: api
  type: NodePort
{{- end }}


