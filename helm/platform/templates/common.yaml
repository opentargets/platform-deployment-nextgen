# Namespace definition.
{{ define "common.namespace" }}
{{- $namespace := include "namespace" . }}
{{- $labels := include "labels" . }}
---
# Namespace {{ $namespace }} for {{ .Values.product }}.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
  {{- if .Values.gcp.enabled }}
  annotations:
    cnrm.cloud.google.com/project-id: {{ .Values.gcpProject }}
  {{- end }}
{{- end }}


{{ define "common.networkpolicy" }}
{{- $prefix := include "prefix-product" . }}
{{- $namespace := include "namespace" . }}
{{- $labels := include "labels" . }}
---
# NetworkPolicy for {{ $namespace }}.
# Default deny all ingress and egress traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-default-deny
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}


{{ define "common.ingress" }}
{{- $prefix := include "prefix-product" . }}
{{- $namespace := include "namespace" . }}
{{- $labels := include "labels" . }}
{{- $subdomain := include "subdomain" . }}
{{- $domain := .Values.domain }}
{{- $dnsZone := .Values.dnsZone }}
{{- $product := .Values.product }}
{{- if .Values.gcp.enabled }}
---
# Ingress for {{ $namespace }}.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $namespace }}-ingress
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    kubernetes.io/ingress.global-static-ip-name: {{ $namespace }}-computeaddress-global
    networking.gke.io/managed-certificates: {{ $namespace }}-ssl-cert,{{ $namespace }}-ssl-cert-fallback
    networking.gke.io/v1beta1.FrontendConfig: {{ $namespace }}-frontendconfig-http-redirect
    cloud.google.com/neg: '{"ingress": true}'
spec:
  rules:
    - host: {{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-webapp
                port:
                  number: {{ include "ports.http" . }}
    - host: www.{{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-webapp
                port:
                  number: {{ include "ports.http" . }}
    - host: api.{{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-api
                port:
                  number: {{ include "ports.http" . }}
    {{- if .Values.aiapi.enabled }}
    - host: ai.{{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-aiapi
                port:
                  number: {{ include "ports.http" . }}
    {{- end }}
    {{- if and (eq $product "platform") (not .Values.subdomainPrefix) }}
    # Entries for old genetics app redirection (production platform only).
    - host: genetics.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-webapp
                port:
                  number: {{ include "ports.http" . }}
    - host: www.genetics.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-webapp
                port:
                  number: {{ include "ports.http" . }}
    {{- end }}

---
# Static IP Address for {{ $namespace }} ingress.
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  name: {{ $namespace }}-computeaddress-global
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  location: global
  description: Global IP address for {{ $namespace }} deployment
  resourceID: {{ $namespace }}-computeaddress-global


---
# DNSRecordSet type A for {{ $namespace }} WebApp.
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: {{ $namespace }}-dnsrecordset-webapp
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  name: {{ $subdomain }}.
  type: A
  ttl: 300
  managedZoneRef:
    external: {{ $dnsZone }}
  rrdatasRefs:
    - kind: ComputeAddress
      name: {{ $namespace }}-computeaddress-global
      namespace: {{ $namespace }}


---
# DNSRecordSet type CNAME for {{ $namespace }} WebApp www prefix.
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: {{ $namespace }}-dnsrecordset-webapp-www
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  name: www.{{ $subdomain }}.
  type: CNAME
  ttl: 300
  managedZoneRef:
    external: {{ $dnsZone }}
  rrdatas:
    - {{ $subdomain }}.


---
# DNSRecordSet type A for {{ $namespace }} API.
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: {{ $namespace }}-dnsrecordset-api
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  name: api.{{ $subdomain }}.
  type: A
  ttl: 300
  managedZoneRef:
    external: {{ $dnsZone }}
  rrdatasRefs:
    - kind: ComputeAddress
      name: {{ $namespace }}-computeaddress-global
      namespace: {{ $namespace }}


---
# DNSRecordSet type A for {{ $namespace }} AI API.
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: {{ $namespace }}-dnsrecordset-aiapi
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  name: ai.{{ $subdomain }}.
  type: A
  ttl: 300
  managedZoneRef:
    external: {{ $dnsZone }}
  rrdatasRefs:
    - kind: ComputeAddress
      name: {{ $namespace }}-computeaddress-global
      namespace: {{ $namespace }}


{{- if and (eq $product "platform") (not .Values.subdomainPrefix) }}
---
# DNSRecordSet type A for {{ $namespace }} old genetics app.
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: {{ $namespace }}-dnsrecordset-genetics
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  name: genetics.{{ $domain }}.
  type: A
  ttl: 300
  managedZoneRef:
    external: {{ $dnsZone }}
  rrdatasRefs:
    - kind: ComputeAddress
      name: {{ $namespace }}-computeaddress-global
      namespace: {{ $namespace }}

---
# DNSRecordSet type CNAME for {{ $namespace }} old genetics app www prefix.
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: {{ $namespace }}-dnsrecordset-genetics-www
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  name: www.genetics.{{ $domain }}.
  type: CNAME
  ttl: 300
  managedZoneRef:
    external: {{ $dnsZone }}
  rrdatas:
    - genetics.{{ $domain }}.
{{- end }}

---
# ManagedCertificate for {{ $namespace }} ingress.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ $namespace }}-ssl-cert
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  domains:
    - {{ $subdomain }}
    - www.{{ $subdomain }}
    - api.{{ $subdomain }}
    - ai.{{ $subdomain }}
    {{- if and (eq $product "platform") (not .Values.subdomainPrefix) }}
    - genetics.{{ $domain }}
    - www.genetics.{{ $domain }}
    {{- end }}


---
# ManagedCertificate for {{ $namespace }} ingress (fallback for renewals).
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ $namespace }}-ssl-cert-fallback
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  domains:
    - {{ $subdomain }}
    - www.{{ $subdomain }}
    - api.{{ $subdomain }}
    - ai.{{ $subdomain }}
    {{- if and (eq $product "platform") (not .Values.subdomainPrefix) }}
    - genetics.{{ $domain }}
    - www.genetics.{{ $domain }}
    {{- end }}


---
# BackendConfig for {{ $namespace }} WebApp (CDN enabled).
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ $namespace }}-backendconfig-cdn
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  customResponseHeaders:
    headers:
      - "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload"
      - "X-Content-Type-Options: nosniff"
      - "X-Frame-Options: DENY"
      - "Content-Security-Policy: base-uri 'self'; frame-ancestors 'none'"
  cdn:
    enabled: true
    cachePolicy:
      includeHost: true
      includeProtocol: true
      includeQueryString: false
    negativeCaching: true
    negativeCachingPolicy:
    - code: 404
      ttl: 120
    - code: 410
      ttl: 120
  {{- if eq $product "ppp" }}
  securityPolicy:
    name: {{ $prefix }}-ppp
  {{- end }}


---
# BackendConfig for {{ $namespace }} API and AI API (CDN disabled).
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ $namespace }}-backendconfig-no-cdn
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  customResponseHeaders:
    headers:
      - "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload"
      - "X-Content-Type-Options: nosniff"
  cdn:
    enabled: false
  {{- if eq $product "ppp" }}
  securityPolicy:
    name: {{ $prefix }}-ppp
  {{- end }}


---
# FrontendConfig for {{ $namespace }} (TLS 1.2 + HTTP→HTTPS redirect).
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: {{ $namespace }}-frontendconfig-http-redirect
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
  sslPolicy: {{ .Values.prefix }}-tls12-policy

{{- else }}
---
# Ingress for {{ $namespace }} (local/non-GCP, nginx ingress controller).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $namespace }}-ingress
  namespace: {{ $namespace }}
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-webapp
                port:
                  number: {{ include "ports.http" . }}
    - host: www.{{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-webapp
                port:
                  number: {{ include "ports.http" . }}
    - host: api.{{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-api
                port:
                  number: {{ include "ports.http" . }}
    {{- if .Values.aiapi.enabled }}
    - host: ai.{{ $subdomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $namespace }}-aiapi
                port:
                  number: {{ include "ports.http" . }}
    {{- end }}
{{- end }}
{{- end }}
