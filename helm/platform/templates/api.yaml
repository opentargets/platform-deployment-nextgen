{{ define "deployment.api" }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
{{- $resources := .Values.resources.api }}
---
# ServiceAccount for {{ $namespace }} API.
# Kubernetes API access is disabled; the API does not need it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $namespace }}-api
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
automountServiceAccountToken: false


---
# NetworkPolicy for {{ $namespace }} API.
# Allows egress to ClickHouse, OpenSearch, and DNS only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-api-egress
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.clickhouse" . }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.opensearch" . }}
    - to: []
      ports:
        - protocol: UDP
          port: {{ include "ports.dns" . }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.dns" . }}


---
# NetworkPolicy for {{ $namespace }} API.
# Allows ingress from all sources to the proxy port (API is browser-called).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-api-ingress
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: {{ include "ports.apiproxy" . }}


---
# HorizontalPodAutoscaler for {{ $namespace }} API.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $namespace }}-api-hpa
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $namespace }}-api
  minReplicas: {{ $resources.minReplicas }}
  maxReplicas: {{ $resources.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60


---
# PodDisruptionBudget for {{ $namespace }} API.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $namespace }}-api-pdb
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api


---
# ConfigMap for {{ $namespace }} API rate-limiter nginx sidecar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $namespace }}-nginx-config
  namespace: {{ $namespace }}
data:
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 4096;
    }
    http {
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    geo $real_client_ip $limit {
      default 1;
      {{- range $ip := .Values.security.rateLimiterWhitelist }}
      {{ $ip }} 0;
      {{- end }}
    }

    map $http_x_forwarded_for $real_client_ip {
      ~^(\S+),\s  $1;
      default     $http_x_forwarded_for;
    }

    map $limit $limit_key {
      0 "";
      1 $real_client_ip;
    }

    limit_req_zone $limit_key zone=api_limit:10m rate=40r/s;
    server {
      listen {{ include "ports.apiproxy" . }};
      location /nginx-health {
        access_log off;
        return 200;
      }
      location / {
        limit_req zone=api_limit burst=80 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:{{ include "ports.http" . }};
      }
    }


---
# API Deployment for {{ $namespace }}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $namespace }}-api
  namespace: {{ $namespace }}
  labels:
    app: api
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        {{- $labels | nindent 8 }}
    spec:
      serviceAccountName: {{ $namespace }}-api
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.gcp.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - production
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  product: {{ .Values.product }}
                  app: api
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: nginx-ratelimit
          image: nginx:alpine
          ports:
            - containerPort: {{ include "ports.apiproxy" . }}
              name: apiproxy
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: {{ include "ports.http" . }}
              name: api
          env:
            - name: SLICK_CLICKHOUSE_URL
              value: jdbc:clickhouse://{{ $namespace }}-clickhouse.{{ $namespace }}.svc.cluster.local:{{ include "ports.clickhouse" . }}
            - name: ELASTICSEARCH_HOST
              value: {{ $namespace }}-opensearch.{{ $namespace }}.svc.cluster.local
            - name: META_DATA_RELEASE
              value: {{ .Values.release | quote }}
            - name: META_API_VERSION
              value: {{ .Values.api.image | splitList ":" | last | quote }}
            - name: META_PRODUCT_NAME
              value: {{ .Values.product | quote }}
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=500
                -XX:InitialRAMPercentage=35.0
                -XX:MaxRAMPercentage=85.0
                -XX:+UseTransparentHugePages
          resources:
            requests:
              memory: {{ $resources.requests.memory }}
              cpu: {{ $resources.requests.cpu }}
            limits:
              memory: {{ $resources.limits.memory }}
              cpu: {{ $resources.limits.cpu }}
          startupProbe:
            httpGet:
              path: {{ include "paths.health.api" . }}
              port: api
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ include "paths.health.api" . }}
              port: api
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ include "paths.health.api" . }}
              port: api
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: nginx-config
          configMap:
            name: {{ $namespace }}-nginx-config
{{- end }}
