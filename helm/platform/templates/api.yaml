{{ define "deployment.api" }}
{{- $root := .root }}
{{- $color := .color | default "blue" }}
{{- $env := include "env" (dict "root" $root "color" $color ) }}
{{- $prefix := $root.Values.prefix }}
{{- $product := .root.Values.product }}
{{- $namespace := include "prefix-product" .root }}
{{- $labels := include "labels" .root }}
{{- $image := index .root.Values $color "api" "image" }}
{{- $release := index .root.Values $color "release" }}
{{- $resources := index .root.Values.resources "api" }}
---
# ServiceAccount for {{ $namespace }}-{{ $color }} API deployment.
# We disable kubernetes API completely here, the API does not need it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $namespace }}-{{ $color }}-api
  namespace: {{ $namespace }}
  labels:
    app: api
    color: {{ $color }}
    {{- $labels | nindent 4 }}
automountServiceAccountToken: false


---
# NetworkPolicy for {{ $namespace }}-{{ $color }} API deployment.
# Allows egress traffic to ClickHouse and OpenSearch only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-{{ $color }}-api-egress
  namespace: {{ $namespace }}
  labels:
    app: api
    color: {{ $color }}
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: api
      color: {{ $color }}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.clickhouse" $root }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.opensearch" $root }}
    - to: []
      ports:
        - protocol: UDP
          port: {{ include "ports.dns" $root }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.dns" $root }}


---
# NetworkPolicy for {{ $namespace }}-{{ $color }} API deployment.
# Allows ingress traffic from all sources to the HTTP port.
# API is called from the clients' browsers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-{{ $color }}-api-ingress
  namespace: {{ $namespace }}
  labels:
    app: api
    color: {{ $color }}
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: api
      color: {{ $color }}
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: {{ include "ports.apiproxy" $root }}


---
# HorizontalPodAutoscaler for {{ $namespace }}-{{ $color }} API deployment.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $namespace }}-{{ $color }}-api-hpa
  namespace: {{ $namespace }}
  labels:
    app: api
    color: {{ $color }}
    {{- $labels | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $namespace }}-{{ $color }}-api
  minReplicas: {{ $resources.minReplicas }}
  maxReplicas: {{ $resources.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60


---
# PodDisruptionBudget for {{ $namespace }}-{{ $color }} API deployment.
# Ensures at least one pod is always running during voluntary disruptions.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $namespace }}-{{ $color }}-api-pdb
  namespace: {{ $namespace }}
  labels:
    app: api
    color: {{ $color }}
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api
      color: {{ $color }}


---
# ConfigMap for {{ $namespace }}-{{ $color }} API rate-limiter nginx sidecar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $namespace }}-{{ $color }}-nginx-config
  namespace: {{ $namespace }}
data:
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 4096;
    }
    http {
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    geo $real_client_ip $limit {
      default 1;
      {{- range $root.Values.security.rateLimiterWhitelist }}
      {{ . }} 0;
      {{- end }}
    }

    map $http_x_forwarded_for $real_client_ip {
      ~^(\S+),\s  $1;
      default     $http_x_forwarded_for;
    }

    map $limit $limit_key {
      0 "";
      1 $real_client_ip;
    }

    limit_req_zone $limit_key zone=api_limit:10m rate=40r/s;
    server {
      listen {{ include "ports.apiproxy" $root }};
      location /nginx-health {
        access_log off;
        return 200;
      }
      location / {
        limit_req zone=api_limit burst=80 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:{{ include "ports.http" $root }};
      }
    }

---
# API {{ $namespace }}-{{ $color }} deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $namespace }}-{{ $color }}-api
  namespace: {{ $namespace }}
  labels:
    app: api
    color: {{ $color }}
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: api
      color: {{ $color }}
  template:
    metadata:
      labels:
        app: api
        color: {{ $color }}
        {{- $labels | nindent 8 }}
    spec:
      serviceAccountName: {{ $namespace }}-{{ $color }}-api
      affinity:
        nodeAffinity: # ensure pods are scheduled to the right type of node (production/staging)
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - {{ $env }}
        podAntiAffinity: # avoid co-locating pods of the same app+color in the same node
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  product: {{ $product }}
                  app: api
                  color: {{ $color }}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx-ratelimit
          image: nginx:alpine
          ports:
            - containerPort: {{ include "ports.apiproxy" $root }}
              name: apiproxy
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: api
          image: {{ $image }}
          ports:
            - containerPort: {{ include "ports.http" $root }}
              name: api
          env:
            - name: SLICK_CLICKHOUSE_URL
              value: jdbc:clickhouse://{{ $namespace }}-{{ $env | replace "production" "prod" }}-clickhouse.{{ $namespace }}.svc.cluster.local:{{ include "ports.clickhouse" $root }}
            - name: ELASTICSEARCH_HOST
              value: {{ $namespace }}-{{ $env | replace "production" "prod" }}-opensearch.{{ $namespace }}.svc.cluster.local
            - name: META_DATA_RELEASE
              value: {{ $release | quote }}
            - name: META_API_VERSION
              value: {{ $image | splitList ":" | last | quote }}
            - name: META_PRODUCT_NAME
              value: {{ $product | quote }}
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=100
                -XX:MaxRAMPercentage=30.0
                -XX:InitialRAMPercentage=25.0
                -XX:ParallelGCThreads=4
                -XX:ConcGCThreads=2
          resources:
            requests:
              memory: {{ $resources.requests.memory }}
              cpu: {{ $resources.requests.cpu }}
            limits:
              memory: {{ $resources.limits.memory }}
              cpu: {{ $resources.limits.cpu }}
          startupProbe:
            httpGet:
              path: {{ include "paths.health.api" $root }}
              port: api
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ include "paths.health.api" $root }}
              port: api
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ include "paths.health.api" $root }}
              port: api
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: nginx-config
          configMap:
            name: {{ $namespace }}-{{ $color }}-nginx-config
{{- end }}
