{{- define "statefulset.clickhouse" -}}
{{- $prefix := include "prefix-product" . }}
{{- $namespace := include "namespace" . }}
{{- $labels := include "labels" . }}
{{- $ch := .Values.clickhouse }}
{{- $chRes := .Values.resources.clickhouse }}
---
# ConfigMap with ClickHouse config for {{ $namespace }}.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $prefix }}-clickhouse-config
  namespace: {{ $namespace }}
data:
  config.xml: |
{{ .Files.Get "files/clickhouse/config.xml" | indent 4 }}
  users.xml: |
{{ .Files.Get "files/clickhouse/users.xml" | indent 4 }}


---
# NetworkPolicy for {{ $namespace }} ClickHouse.
# Allows ingress from API pods only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-clickhouse-ingress
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: clickhouse
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: {{ include "ports.clickhouse" . }}
        - protocol: TCP
          port: 9000

---
# NetworkPolicy for {{ $namespace }} ClickHouse.
# Allows ingress from Prometheus pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-clickhouse-metrics-ingress
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: clickhouse
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: {{ include "ports.clickhouse.metrics" . }}


---
# NetworkPolicy for {{ $namespace }} ClickHouse.
# Allows egress for DNS and HTTPS (GCS access).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-clickhouse-egress
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: clickhouse
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: {{ include "ports.dns" . }}
        - protocol: TCP
          port: {{ include "ports.dns" . }}
    - ports:
        - protocol: TCP
          port: 443


---
# PodDisruptionBudget for {{ $namespace }} ClickHouse.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $prefix }}-clickhouse-pdb
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: clickhouse

{{- if and .Values.gcp.enabled $ch.snapshot }}
---
# VolumeSnapshotContent with the {{ $namespace }} ClickHouse data snapshot.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotContent
metadata:
  name: {{ $prefix }}-clickhouse
spec:
  deletionPolicy: Retain
  driver: pd.csi.storage.gke.io
  source:
    snapshotHandle: {{ $ch.snapshot }}
  volumeSnapshotRef:
    name: {{ $prefix }}-clickhouse
    namespace: {{ $namespace }}


---
# VolumeSnapshot referencing the {{ $namespace }} ClickHouse snapshot content.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: {{ $prefix }}-clickhouse
  namespace: {{ $namespace }}
spec:
  source:
    volumeSnapshotContentName: {{ $prefix }}-clickhouse
{{- end }}


---
# StatefulSet for {{ $namespace }} ClickHouse.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $prefix }}-clickhouse
  namespace: {{ $namespace }}
  labels:
    app: clickhouse
    {{- $labels | nindent 4 }}
spec:
  serviceName: {{ $prefix }}-clickhouse
  replicas: {{ $chRes.replicas }}
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
        {{- $labels | nindent 8 }}
      annotations:
        checksum/config: {{ print (.Files.Get "files/clickhouse/config.xml") (.Files.Get "files/clickhouse/users.xml") | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - key: workload
          value: clickhouse
          effect: NoSchedule
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      {{- if .Values.gcp.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - clickhouse
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: clickhouse
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: clickhouse
          image: {{ $ch.image }}
          ports:
            - containerPort: {{ include "ports.clickhouse" . }}
              name: http
            - containerPort: {{ include "ports.clickhouse.metrics" . }}
              name: metrics
            - containerPort: 9000
              name: native
          resources:
            requests:
              cpu: {{ $chRes.requests.cpu | quote }}
              memory: {{ $chRes.requests.memory | quote }}
            limits:
              cpu: {{ $chRes.limits.cpu | quote }}
              memory: {{ $chRes.limits.memory | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: tmp
              mountPath: /var/lib/clickhouse-tmp
            - name: config
              mountPath: /etc/clickhouse-server/config.d/config.xml
              subPath: config.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.d/users.xml
              subPath: users.xml
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: {{ $prefix }}-clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.gcp.enabled }}
        storageClassName: hyperdisk-balanced
        {{- if $ch.snapshot }}
        dataSource:
          name: {{ $prefix }}-clickhouse
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ $chRes.storageSize | quote }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
{{- end }}
