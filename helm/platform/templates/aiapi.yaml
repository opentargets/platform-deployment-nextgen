{{ define "deployment.aiapi" }}
{{- if .Values.aiapi.enabled }}
{{- $namespace := include "prefix-product" . }}
{{- $labels := include "labels" . }}
{{- $subdomain := include "subdomain" . }}
{{- $resources := .Values.resources.aiapi }}
{{- if .Values.gcp.enabled }}
---
# SecretProviderClass for {{ $namespace }} OpenAI token (GCP Secret Manager).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $namespace }}-aiapi-openai-token
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: {{ .Values.aiapi.secrets.openai }}/versions/latest
        fileName: openai_token
{{- else if .Values.aiapi.secrets.openai }}
---
# Secret for {{ $namespace }} OpenAI token (local/non-GCP).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $namespace }}-aiapi-openai-token
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  openai_token: {{ .Values.aiapi.secrets.openai | quote }}
{{- end }}


---
# NetworkPolicy for {{ $namespace }} AI API.
# Allows ingress from all sources (AI API is browser-called).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-aiapi-ingress
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: aiapi
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: {{ include "ports.http" . }}


---
# NetworkPolicy for {{ $namespace }} AI API.
# Allows egress for OpenAI and EBI queries.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $namespace }}-aiapi-egress
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: aiapi
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to: []
      ports:
        - protocol: UDP
          port: {{ include "ports.dns" . }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "ports.dns" . }}


---
# ServiceAccount for {{ $namespace }} AI API.
# On GCP, bound to the GSA with Secret Manager Accessor role via Workload Identity.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $namespace }}-aiapi
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
  {{- if .Values.gcp.enabled }}
  annotations:
    iam.gke.io/gcp-service-account: {{ $namespace }}-aiapi@{{ .Values.gcpProject }}.iam.gserviceaccount.com
  {{- end }}

{{- if .Values.gcp.enabled }}
---
# Role for {{ $namespace }} AI API to read its SecretProviderClass.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $namespace }}-aiapi-secrets
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
rules:
- apiGroups: ["secrets-store.csi.x-k8s.io"]
  resources: ["secretproviderclasses"]
  verbs: ["get"]
  resourceNames: ["{{ $namespace }}-aiapi-openai-token"]


---
# RoleBinding for {{ $namespace }} AI API secrets Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $namespace }}-aiapi-secrets
  namespace: {{ $namespace }}
subjects:
- kind: ServiceAccount
  name: {{ $namespace }}-aiapi
  namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $namespace }}-aiapi-secrets
{{- end }}


---
# HorizontalPodAutoscaler for {{ $namespace }} AI API.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $namespace }}-aiapi-hpa
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $namespace }}-aiapi
  minReplicas: {{ $resources.minReplicas }}
  maxReplicas: {{ $resources.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60


---
# PodDisruptionBudget for {{ $namespace }} AI API.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $namespace }}-aiapi-pdb
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aiapi


---
# AI API Deployment for {{ $namespace }}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $namespace }}-aiapi
  namespace: {{ $namespace }}
  labels:
    app: aiapi
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: aiapi
  template:
    metadata:
      labels:
        app: aiapi
        {{- $labels | nindent 8 }}
    spec:
      serviceAccountName: {{ $namespace }}-aiapi
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.gcp.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - production
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  product: {{ .Values.product }}
                  app: aiapi
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: aiapi
          image: {{ .Values.aiapi.image }}
          ports:
            - containerPort: {{ include "ports.http" . }}
              name: aiapi
          env:
            - name: OPENAI_TOKEN_FILE
              value: /mnt/secrets/openai_token
            - name: CORS_ORIGIN_URLS
              value: "https://{{ $subdomain }}"
          resources:
            requests:
              memory: {{ $resources.requests.memory }}
              cpu: {{ $resources.requests.cpu }}
            limits:
              memory: {{ $resources.limits.memory }}
              cpu: {{ $resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: {{ include "paths.health.aiapi" . }}
              port: aiapi
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: {{ include "paths.health.aiapi" . }}
              port: aiapi
            initialDelaySeconds: 5
          {{- if or .Values.gcp.enabled .Values.aiapi.secrets.openai }}
          volumeMounts:
            - mountPath: /mnt/secrets
              name: secrets
              readOnly: true
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      {{- if or .Values.gcp.enabled .Values.aiapi.secrets.openai }}
      volumes:
        - name: secrets
          {{- if .Values.gcp.enabled }}
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ $namespace }}-aiapi-openai-token
          {{- else }}
          secret:
            secretName: {{ $namespace }}-aiapi-openai-token
          {{- end }}
      {{- end }}
{{- end }}
{{- end }}
