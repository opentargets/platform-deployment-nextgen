{{- define "statefulset.opensearch" -}}
{{- $prefix := include "prefix-product" . }}
{{- $namespace := include "namespace" . }}
{{- $labels := include "labels" . }}
{{- $os := .Values.opensearch }}
{{- $osRes := .Values.resources.opensearch }}

---
# NetworkPolicy for {{ $namespace }} OpenSearch.
# Allows ingress from API pods only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-opensearch-ingress
  namespace: {{ $namespace }}
  labels:
    app: opensearch
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: {{ include "ports.opensearch" . }}

---
# NetworkPolicy for {{ $namespace }} OpenSearch.
# Allows ingress from Prometheus pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-opensearch-metrics-ingress
  namespace: {{ $namespace }}
  labels:
    app: opensearch
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: {{ include "ports.opensearch" . }}


---
# NetworkPolicy for {{ $namespace }} OpenSearch.
# Allows egress for DNS and HTTPS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $prefix }}-opensearch-egress
  namespace: {{ $namespace }}
  labels:
    app: opensearch
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: opensearch
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: {{ include "ports.dns" . }}
        - protocol: TCP
          port: {{ include "ports.dns" . }}
    - ports:
        - protocol: TCP
          port: 443


---
# PodDisruptionBudget for {{ $namespace }} OpenSearch.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $prefix }}-opensearch-pdb
  namespace: {{ $namespace }}
  labels:
    app: opensearch
    {{- $labels | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: opensearch

{{- if and .Values.gcp.enabled $os.snapshot }}
---
# VolumeSnapshotContent with the {{ $namespace }} OpenSearch data snapshot.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotContent
metadata:
  name: {{ $prefix }}-opensearch
spec:
  deletionPolicy: Retain
  driver: pd.csi.storage.gke.io
  source:
    snapshotHandle: {{ $os.snapshot }}
  volumeSnapshotRef:
    name: {{ $prefix }}-opensearch
    namespace: {{ $namespace }}


---
# VolumeSnapshot referencing the {{ $namespace }} OpenSearch snapshot content.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: {{ $prefix }}-opensearch
  namespace: {{ $namespace }}
spec:
  source:
    volumeSnapshotContentName: {{ $prefix }}-opensearch
{{- end }}


---
# StatefulSet for {{ $namespace }} OpenSearch.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $prefix }}-opensearch
  namespace: {{ $namespace }}
  labels:
    app: opensearch
    {{- $labels | nindent 4 }}
spec:
  serviceName: {{ $prefix }}-opensearch
  replicas: {{ $osRes.replicas }}
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
        {{- $labels | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - key: workload
          value: opensearch
          effect: NoSchedule
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- if .Values.gcp.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - opensearch
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: opensearch
              topologyKey: kubernetes.io/hostname
      {{- end }}
      initContainers:
        - name: install-plugins
          image: {{ $os.image }}
          command:
            - /bin/bash
            - -c
            - |
              # Install plugins
              /usr/share/opensearch/bin/opensearch-plugin install --batch https://github.com/opensearch-project/opensearch-prometheus-exporter/releases/download/3.5.0.0/prometheus-exporter-3.5.0.0.zip
              # Copy plugins to shared volume
              cp -r /usr/share/opensearch/plugins/* /plugins/
          volumeMounts:
            - name: plugins
              mountPath: /plugins
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      containers:
        - name: opensearch
          image: {{ $os.image }}
          ports:
            - containerPort: {{ include "ports.opensearch" . }}
              name: http
            - containerPort: 9600
              name: metrics
          env:
            - name: discovery.type
              value: "single-node"
            - name: network.host
              value: "0.0.0.0"
            - name: bootstrap.memory_lock
              value: {{ if .Values.gcp.enabled }}"true"{{ else }}"false"{{ end }}
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: path.data
              value: /usr/share/opensearch/data/data
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms{{ $osRes.heapSize }} -Xmx{{ $osRes.heapSize }}{{ if .Values.gcp.enabled }} -XX:+UseTransparentHugePages{{ end }}"
            - name: OPENSEARCH_PATH_CONF
              value: /usr/share/opensearch/config
            - name: prometheus.indices
              value: "true"
            - name: prometheus.cluster.settings
              value: "true"
          resources:
            requests:
              cpu: {{ $osRes.requests.cpu | quote }}
              memory: {{ $osRes.requests.memory | quote }}
            limits:
              cpu: {{ $osRes.limits.cpu | quote }}
              memory: {{ $osRes.limits.memory | quote }}
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: logs
              mountPath: /usr/share/opensearch/logs
            - name: plugins
              mountPath: /usr/share/opensearch/plugins
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: {{ include "ports.opensearch" . }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: {{ if .Values.gcp.enabled }}6{{ else }}12{{ end }}
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: {{ include "ports.opensearch" . }}
            initialDelaySeconds: {{ if .Values.gcp.enabled }}60{{ else }}120{{ end }}
            periodSeconds: 20
            failureThreshold: 6
      volumes:
        - name: logs
          emptyDir: {}
        - name: plugins
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.gcp.enabled }}
        storageClassName: hyperdisk-balanced
        {{- if $os.snapshot }}
        dataSource:
          name: {{ $prefix }}-opensearch
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ $osRes.storageSize | quote }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
{{- end }}
