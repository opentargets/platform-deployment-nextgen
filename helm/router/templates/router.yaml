{{- $activeNamespace := printf "%s-%s-%s" .Values.envPrefix .Values.activeColor .Values.product }}
{{- $routerNamespace := printf "%s-%s" .Values.envPrefix .Values.product }}
{{- $inactiveColor := ternary "green" "blue" (eq .Values.activeColor "blue") }}
{{- $inactiveNamespace := printf "%s-%s-%s" .Values.envPrefix $inactiveColor .Values.product }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $routerNamespace }}
# "prod"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-prod
  namespace: {{ $routerNamespace }}
spec:
  type: ExternalName
  externalName: {{ $activeNamespace }}-webapp.{{ $activeNamespace }}.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-prod
  namespace: {{ $routerNamespace }}
spec:
  type: ExternalName
  externalName: {{ $activeNamespace }}-api.{{ $activeNamespace }}.svc.cluster.local
  ports:
    - port: 8080
# "staging"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-staging
  namespace: {{ $routerNamespace }}
spec:
  type: ExternalName
  externalName: {{ $inactiveNamespace }}-webapp.{{ $inactiveNamespace }}.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-staging
  namespace: {{ $routerNamespace }}
spec:
  type: ExternalName
  externalName: {{ $inactiveNamespace }}-api.{{ $inactiveNamespace }}.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: production-ingress
  namespace: {{ $routerNamespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/service-upstream: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-prod
                port:
                  number: 8080
    - host: api.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-prod
                port:
                  number: 8080
    - host: staging.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-staging
                port:
                  number: 8080
    - host: api.staging.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-staging
                port:
                  number: 8080
