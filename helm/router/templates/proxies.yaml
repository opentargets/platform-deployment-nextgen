{{- $activeColour := .Values.activeColour }}
{{- $inactiveColour := ternary "green" "blue" (eq .Values.activeColour "blue") }}
{{- $activeNamespace := printf "%s-%s-%s" .Values.envPrefix $activeColour .Values.product }}
{{- $inactiveNamespace := printf "%s-%s-%s" .Values.envPrefix $inactiveColour .Values.product }}
{{- $routerNamespace := printf "%s-%s" .Values.envPrefix .Values.product }}
{{- $cdnBackend := printf "%s-backendconfig-cdn" $routerNamespace }}
{{- $noCdnBackend := printf "%s-backendconfig-no-cdn" $routerNamespace }}

{{- range list
  (dict "name" "webapp-prod"    "upstream" (printf "%s-webapp.%s.svc.cluster.local:8080" $activeNamespace $activeNamespace)   "backend" $cdnBackend)
  (dict "name" "api-prod"       "upstream" (printf "%s-api.%s.svc.cluster.local:8080" $activeNamespace $activeNamespace)      "backend" $noCdnBackend)
  (dict "name" "webapp-staging" "upstream" (printf "%s-webapp.%s.svc.cluster.local:8080" $inactiveNamespace $inactiveNamespace) "backend" $cdnBackend)
  (dict "name" "api-staging"    "upstream" (printf "%s-api.%s.svc.cluster.local:8080" $inactiveNamespace $inactiveNamespace)    "backend" $noCdnBackend)
}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .name }}-proxy-config
  namespace: {{ $routerNamespace }}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;
        location / {
          proxy_pass http://{{ .upstream }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}-proxy
  namespace: {{ $routerNamespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}-proxy
  template:
    metadata:
      annotations:
        checksum/config: "{{ .upstream | sha256sum }}"
      labels:
        app: {{ .name }}-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: {{ .name }}-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $routerNamespace }}
  {{- if $.Values.gcp.enabled }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "{{ .backend }}"}'
  {{- end }}
spec:
  selector:
    app: {{ .name }}-proxy
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
{{- end }}

{{- if .Values.aiapi.enabled }}
{{- range list
  (dict "name" "aiapi-prod"    "upstream" (printf "%s-aiapi.%s.svc.cluster.local:8080" $activeNamespace $activeNamespace))
  (dict "name" "aiapi-staging" "upstream" (printf "%s-aiapi.%s.svc.cluster.local:8080" $inactiveNamespace $inactiveNamespace))
}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .name }}-proxy-config
  namespace: {{ $routerNamespace }}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;
        location / {
          proxy_pass http://{{ .upstream }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}-proxy
  namespace: {{ $routerNamespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}-proxy
  template:
    metadata:
      annotations:
        checksum/config: "{{ .upstream | sha256sum }}"
      labels:
        app: {{ .name }}-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: {{ .name }}-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $routerNamespace }}
  {{- if $.Values.gcp.enabled }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "{{ $noCdnBackend }}"}'
  {{- end }}
spec:
  selector:
    app: {{ .name }}-proxy
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
{{- end }}
{{- end }}

{{- if not .Values.gcp.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $routerNamespace }}-ingress
  namespace: {{ $routerNamespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-prod
                port:
                  number: 8080
    - host: api.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-prod
                port:
                  number: 8080
    - host: staging.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-staging
                port:
                  number: 8080
    - host: api.staging.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-staging
                port:
                  number: 8080
    {{- if .Values.aiapi.enabled }}
    - host: ai.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aiapi-prod
                port:
                  number: 8080
    - host: ai.staging.platform.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aiapi-staging
                port:
                  number: 8080
    {{- end }}
{{- end }}
