---
# Service that exposes OpenSearch pods within the cluster.
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: databases
spec:
  type: ClusterIP
  selector:
    app: opensearch
  ports:
    - port: 9200
      targetPort: 9200
      name: http
    - port: 9600
      targetPort: 9600
      name: metrics


---
# PodDisruptionBudget to ensure at least one OpenSearch pod is always available.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch
  namespace: databases
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: opensearch


---
# VolumeSnapshotContent containing the OpenSearch data.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotContent
metadata:
  name: opensearch-data-snapshotcontent
spec:
  deletionPolicy: Retain
  driver: pd.csi.storage.gke.io
  source:
    snapshotHandle: projects/{{ .Values.gcpProject }}/global/snapshots/{{ .Values.opensearch.snapshot }}
  volumeSnapshotRef:
    name: opensearch-data-snapshot
    namespace: databases


---
# VolumeSnapshot to reference the OpenSearch data snapshot content.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: opensearch-data-snapshot
  namespace: databases
spec:
  source:
    volumeSnapshotContentName: opensearch-data-snapshotcontent


---
# StatefulSet for OpenSearch.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: databases
spec:
  serviceName: opensearch
  replicas: {{ .Values.opensearch.replicas }}
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
      annotations:
        # Trigger a rolling update if the config changes
        checksum/config: {{ .Files.Get "files/opensearch/opensearch.yml" | sha256sum }}
    spec:
      tolerations:
        - key: workload
          value: opensearch
          effect: NoSchedule
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - opensearch
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: opensearch
              topologyKey: kubernetes.io/hostname
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:{{ .Values.opensearch.version }}
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9600
              name: metrics
          env:
            - name: discovery.type
              value: "single-node"
            - name: network.host
              value: "0.0.0.0"
            - name: bootstrap.memory_lock
              value: "true"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: path.data
              value: /usr/share/opensearch/data/data
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms{{ .Values.opensearch.heapSize }} -Xmx{{ .Values.opensearch.heapSize }} -XX:+UseTransparentHugePages"
            - name: OPENSEARCH_PATH_CONF
              value: /usr/share/opensearch/config
          resources:
            requests:
              cpu: {{ .Values.opensearch.resources.requests.cpu | quote }}
              memory: {{ .Values.opensearch.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.opensearch.resources.limits.cpu | quote }}
              memory: {{ .Values.opensearch.resources.limits.memory | quote }}
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: logs
              mountPath: /usr/share/opensearch/logs
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: hyperdisk-balanced
        dataSource:
          name: opensearch-data-snapshot
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        resources:
          requests:
            storage: {{ .Values.opensearch.storageSize | quote }}
