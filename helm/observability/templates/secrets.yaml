apiVersion: v1
kind: Secret
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: ot-dashboard
stringData:
  pg-db.yaml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://observability-prometheus-server.observability.svc:80
        editable: true
        access: proxy
        orgId: 1
        isDefault: true
        version: 1
        uid: prometheusdatasource
      - name: Loki
        type: loki
        access: proxy
        url: http://observability-loki-gateway.observability.svc.cluster.local
        jsonData:
          httpHeaderName1: 'X-Scope-OrgID'
        secureJsonData:
          httpHeaderValue1: 'default'
